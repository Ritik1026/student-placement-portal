version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: placement_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - placement_network

  # Redis Cache
  redis:
    image: redis:latest
    container_name: placement_redis
    ports:
      - "6379:6379"
    networks:
      - placement_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: placement_backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/placement_portal
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key}
      NODE_ENV: development
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - placement_network

  # Python AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: placement_ai
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      AI_SERVICE_PORT: 8000
    depends_on:
      - backend
    volumes:
      - ./ai-service:/app
    networks:
      - placement_network

  # Frontend (optional, for development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: placement_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - placement_network

volumes:
  mongodb_data:

networks:
  placement_network:
    driver: bridge
